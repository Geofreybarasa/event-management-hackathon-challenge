<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventFlow — QR Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --green: #43e97b;
      --red: #ff6584;
      --orange: #f5a623;
      --text: #f0f0f8;
      --muted: #7a7a9a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
    }

    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .scan-count {
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      transition: 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .back-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .instructions {
      text-align: center;
      margin-bottom: 24px;
    }

    .instructions h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .instructions p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── SCANNER WRAPPER ── */
    .scanner-wrapper {
      position: relative;
      width: 300px;
      height: 300px;
      margin-bottom: 20px;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
      display: block;
      background: #000;
    }

    /* pulse ring */
    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 20px;
      border: 2px solid var(--accent);
      animation: pulseRing 2s ease infinite;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes pulseRing {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.02); }
    }

    /* corner decorations */
    .corner {
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: var(--accent);
      border-style: solid;
      z-index: 20;
      pointer-events: none;
    }

    .tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* scan line */
    .scan-line {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanLine 2s linear infinite;
      z-index: 15;
      pointer-events: none;
      border-radius: 2px;
    }

    @keyframes scanLine {
      0% { top: 4px; opacity: 1; }
      90% { opacity: 1; }
      100% { top: calc(100% - 4px); opacity: 0; }
    }

    /* dim overlay */
    .scan-mask {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 10;
    }

    /* ── STATUS OVERLAY ── */
    .status-overlay {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 50;
      text-align: center;
      padding: 20px;
    }

    .status-overlay.show { display: flex; animation: popIn 0.3s ease; }
    .status-overlay.success { background: rgba(67,233,123,0.96); }
    .status-overlay.error   { background: rgba(255,101,132,0.96); }
    .status-overlay.warning { background: rgba(245,166,35,0.96); }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .status-icon    { font-size: 56px; margin-bottom: 10px; }
    .status-text    { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: white; }
    .status-subtext { margin-top: 6px; color: rgba(255,255,255,0.85); font-size: 13px; line-height: 1.4; }

    /* ── CAMERA ERROR ── */
    .camera-error {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 14px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 60;
    }

    .camera-error .icon { font-size: 48px; margin-bottom: 12px; }
    .camera-error p { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .camera-error button {
      margin-top: 14px;
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      gap: 12px;
      margin: 16px 0 24px;
    }

    .action-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      transition: 0.2s;
    }

    .action-btn:hover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.08);
    }

    /* ── RECENT SCANS ── */
    .recent-scans {
      width: 100%;
      max-width: 440px;
    }

    .recent-title {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .scan-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .scan-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .scan-dot.success { background: var(--green); }
    .scan-dot.error   { background: var(--red); }
    .scan-dot.warning { background: var(--orange); }

    .scan-info { flex: 1; min-width: 0; }
    .scan-name   { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .scan-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .scan-time   { font-size: 11px; color: var(--muted); flex-shrink: 0; }

    /* ── EMPTY HISTORY ── */
    .empty-history {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .scanner-wrapper { width: 88vw; height: 88vw; }
      .header { padding: 14px 16px; }
      .header-right { gap: 8px; }
      .back-btn { padding: 6px 10px; font-size: 12px; }
      .scan-count { padding: 5px 10px; font-size: 12px; }
      .instructions h2 { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Event<span>Flow</span></div>
    <div class="header-right">
      <div class="scan-count">Scanned: <span id="scan-count">0</span></div>
      <a href="/" class="back-btn">← Dashboard</a>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="instructions">
      <h2>QR Code Check-in Scanner</h2>
      <p>Point the camera at the attendee's QR code to check them in instantly</p>
    </div>

    <!-- SCANNER BOX -->
    <div class="scanner-wrapper">
      <div class="pulse-ring"></div>
      <div class="scan-line"></div>
      <div class="scan-mask"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" style="display:none"></canvas>

      <!-- STATUS OVERLAY -->
      <div class="status-overlay" id="status-overlay">
        <div class="status-icon" id="status-icon">✅</div>
        <div class="status-text" id="status-text">Success</div>
        <div class="status-subtext" id="status-subtext">Checked in</div>
      </div>

      <!-- CAMERA ERROR -->
      <div class="camera-error" id="camera-error">
        <div class="icon">📷</div>
        <p>Camera access denied or unavailable. Please allow camera permissions and try again.</p>
        <button onclick="startCamera()">Retry Camera</button>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="action-btn" id="torch-btn">🔦 Torch</button>
      <button class="action-btn" id="fullscreen-btn">⛶ Fullscreen</button>
    </div>

    <!-- SCAN HISTORY -->
    <div class="recent-scans">
      <div class="recent-title">Recent Scans</div>
      <div id="scan-history">
        <div class="empty-history">No scans yet — start scanning!</div>
      </div>
    </div>

  </div>

  <!-- jsQR library -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <script>
    // ── CONFIG ──
    // Uses same origin so works on any port
    const API = window.location.origin + '/api';

    let stream     = null;
    let scanning   = true;
    let processing = false;
    let scanCount  = 0;
    let torchOn    = false;

    // ── BEEP ──
    function beep(type = 'success') {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = type === 'success' ? 880 : 300;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      } catch(e) {}

      if (navigator.vibrate) {
        navigator.vibrate(type === 'success' ? [100] : [300, 100, 300]);
      }
    }

    // ── START CAMERA ──
    async function startCamera() {
      try {
        // hide error, show video
        document.getElementById('camera-error').style.display = 'none';
        document.getElementById('video').style.display = 'block';

        // request camera — prefer back camera on mobile
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 1280 },
            height: { ideal: 720 }
          }
        });

        const video = document.getElementById('video');
        video.srcObject = stream;
        await video.play();

        // start scanning loop
        requestAnimationFrame(scanFrame);

      } catch(err) {
        console.error('Camera error:', err.message);
        document.getElementById('video').style.display = 'none';
        document.getElementById('camera-error').style.display = 'flex';
      }
    }

    // ── SCAN FRAME ──
    // Runs on every animation frame looking for QR codes
    function scanFrame() {
      // if paused (processing a scan) keep looping but don't scan
      if (!scanning) {
        requestAnimationFrame(scanFrame);
        return;
      }

      const video  = document.getElementById('video');
      const canvas = document.getElementById('canvas');

      // only process when video has data
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        // jsQR reads pixels and finds QR code data
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'attemptBoth'
        });

        if (code && !processing) {
          processing = true;
          scanning   = false;
          handleScan(code.data);
        }
      }

      // throttle to ~30fps to save CPU
      setTimeout(() => requestAnimationFrame(scanFrame), 33);
    }

    // ── HANDLE SCAN ──
    async function handleScan(qrData) {
      try {
        console.log('QR detected:', qrData);

        const url = `${API}/scan/${encodeURIComponent(qrData)}`;
        console.log('Calling:', url);

        const res  = await fetch(url);
        const data = await res.json();

        console.log('Status:', res.status, '| Response:', data);

        if (data.success) {
          // ✅ successful check-in
          beep('success');
          showStatus(
            'success', '✅',
            `Welcome, ${data.attendee.name}!`,
            `${data.attendee.event} · ${data.totalCheckedIn} checked in`
          );
          addToHistory('success', data.attendee.name, data.attendee.event);
          scanCount++;
          document.getElementById('scan-count').textContent = scanCount;

        } else if (res.status === 400) {
          // ⚠️ already checked in
          beep('error');
          const name = data.attendee ? data.attendee.name : 'Attendee';
          showStatus('warning', '⚠️', 'Already Checked In', `${name} was already checked in`);
          addToHistory('warning', name, 'Already checked in');

        } else {
          // ❌ invalid QR
          beep('error');
          showStatus('error', '❌', 'Invalid QR Code', 'This code was not recognized');
          addToHistory('error', 'Unknown', 'Invalid QR code');
        }

      } catch(err) {
        console.error('Scan error:', err.message);
        beep('error');
        showStatus('error', '❌', 'Connection Error', 'Could not reach server — check your connection');
        addToHistory('error', 'Error', err.message);
      }

      // reset after 3 seconds ready for next scan
      setTimeout(() => {
        hideStatus();
        processing = false;
        scanning   = true;
      }, 3000);
    }

    // ── SHOW STATUS ──
    function showStatus(type, icon, text, subtext) {
      const el = document.getElementById('status-overlay');
      el.className = `status-overlay show ${type}`;
      document.getElementById('status-icon').textContent    = icon;
      document.getElementById('status-text').textContent    = text;
      document.getElementById('status-subtext').textContent = subtext;
    }

    // ── HIDE STATUS ──
    function hideStatus() {
      document.getElementById('status-overlay').className = 'status-overlay';
    }

    // ── ADD TO HISTORY ──
    function addToHistory(type, name, detail) {
      const history = document.getElementById('scan-history');

      // remove empty state if present
      const empty = history.querySelector('.empty-history');
      if (empty) empty.remove();

      const time = new Date().toLocaleTimeString('en-KE', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });

      const item = document.createElement('div');
      item.className = 'scan-item';
      item.innerHTML = `
        <div class="scan-dot ${type}"></div>
        <div class="scan-info">
          <div class="scan-name">${name}</div>
          <div class="scan-detail">${detail}</div>
        </div>
        <div class="scan-time">${time}</div>
      `;

      history.insertBefore(item, history.firstChild);

      // keep only last 6 items
      const items = history.querySelectorAll('.scan-item');
      if (items.length > 6) items[items.length - 1].remove();
    }

    // ── TORCH TOGGLE ──
    async function toggleTorch() {
      if (!stream) return;
      try {
        const track = stream.getVideoTracks()[0];
        const caps  = track.getCapabilities();
        if (!caps.torch) { alert('Torch not supported on this device'); return; }
        torchOn = !torchOn;
        await track.applyConstraints({ advanced: [{ torch: torchOn }] });
        document.getElementById('torch-btn').textContent = torchOn ? '🔦 Torch ON' : '🔦 Torch';
      } catch(err) {
        console.error('Torch error:', err);
      }
    }

    // ── FULLSCREEN ──
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }

    // ── OFFLINE DETECTION ──
    window.addEventListener('offline', () => {
      showStatus('error', '📡', 'No Internet', 'Check your connection');
    });

    // ── CLEANUP ON CLOSE ──
    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
    });

    // ── EVENT LISTENERS ──
    document.getElementById('torch-btn').addEventListener('click', toggleTorch);
    document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);

    // ── INIT ──
    startCamera();
  </script>

</body>
</html>
