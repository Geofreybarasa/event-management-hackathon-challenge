<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventFlow — QR Scanner</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --green: #43e97b;
      --red: #ff6584;
      --orange: #f5a623;
      --text: #f0f0f8;
      --muted: #7a7a9a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* HEADER */

    .header {
      width: 100%;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      z-index: 10;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
    }

    .logo span {
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .scan-count {
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    /* MAIN */

    .content {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .instructions {
      text-align: center;
      margin-bottom: 24px;
    }

    .instructions h2 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .instructions p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /* SCANNER */

    .scanner-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      margin-bottom: 20px;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
      display: block;
    }

    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 18px;
      border: 2px solid var(--accent);
      animation: pulseRing 2s ease infinite;
      pointer-events: none;
    }

    @keyframes pulseRing {
      0%,100% {
        opacity: 0.3;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.02);
      }
    }

    /* CORNERS */

    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: var(--accent);
      border-style: solid;
      z-index: 20;
    }

    .tl {
      top: -2px;
      left: -2px;
      border-width: 3px 0 0 3px;
    }

    .tr {
      top: -2px;
      right: -2px;
      border-width: 3px 3px 0 0;
    }

    .bl {
      bottom: -2px;
      left: -2px;
      border-width: 0 0 3px 3px;
    }

    .br {
      bottom: -2px;
      right: -2px;
      border-width: 0 3px 3px 0;
    }

    /* SCAN LINE */

    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent,
        var(--accent),
        transparent
      );
      animation: scanLine 2s linear infinite;
      z-index: 10;
    }

    @keyframes scanLine {
      0% {
        top: 0;
      }

      100% {
        top: 100%;
      }
    }

    /* SCAN MASK */

    .scan-mask {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,0.45),
        inset 0 0 0 2px rgba(255,255,255,0.05);
      pointer-events: none;
    }

    /* STATUS */

    .status-overlay {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 50;
      text-align: center;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }

    .status-overlay.show {
      display: flex;
    }

    .status-overlay.success {
      background: rgba(67,233,123,0.95);
    }

    .status-overlay.error {
      background: rgba(255,101,132,0.95);
    }

    .status-overlay.warning {
      background: rgba(245,166,35,0.95);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .status-icon {
      font-size: 60px;
      margin-bottom: 12px;
    }

    .status-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: white;
    }

    .status-subtext {
      margin-top: 8px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }

    /* LOADER */

    .loader {
      position: absolute;
      width: 55px;
      height: 55px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 40;
      display: none;
    }

    @keyframes spin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    /* CAMERA ERROR */

    .camera-error {
      width: 320px;
      height: 320px;
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 14px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .camera-error .icon {
      font-size: 50px;
      margin-bottom: 14px;
    }

    .camera-error p {
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .camera-error button {
      margin-top: 16px;
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* ACTIONS */

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      margin-bottom: 28px;
    }

    .action-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }

    .action-btn:hover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.08);
    }

    /* HISTORY */

    .recent-scans {
      width: 100%;
      max-width: 480px;
    }

    .recent-title {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .scan-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .scan-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .scan-dot.success {
      background: var(--green);
    }

    .scan-dot.error {
      background: var(--red);
    }

    .scan-dot.warning {
      background: var(--orange);
    }

    .scan-info {
      flex: 1;
    }

    .scan-name {
      font-size: 14px;
      font-weight: 500;
    }

    .scan-detail {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .scan-time {
      font-size: 11px;
      color: var(--muted);
    }

    @media (max-width: 500px) {
      .scanner-wrapper {
        width: 92vw;
        height: 92vw;
      }

      .camera-error {
        width: 92vw;
        height: 92vw;
      }

      .header {
        padding: 16px;
      }

      .header-right {
        gap: 8px;
      }

      .back-btn {
        padding: 8px 10px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->

  <div class="header">
    <div class="logo">Event<span>Flow</span></div>

    <div class="header-right">
      <div class="scan-count">
        Scanned today:
        <span id="scan-count">0</span>
      </div>

      <a href="/" class="back-btn">
        ← Dashboard
      </a>
    </div>
  </div>

  <!-- CONTENT -->

  <div class="content">

    <div class="instructions">
      <h2>QR Code Check-in Scanner</h2>

      <p>
        Point the camera at the attendee's QR code
        to check them in instantly
      </p>
    </div>

    <!-- SCANNER -->

    <div class="scanner-wrapper">

      <div class="pulse-ring"></div>

      <div class="scan-line"></div>

      <div class="scan-mask"></div>

      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <video
        id="video"
        autoplay
        playsinline
        muted
      ></video>

      <canvas id="canvas" style="display:none"></canvas>

      <!-- LOADER -->

      <div class="loader" id="loader"></div>

      <!-- STATUS -->

      <div class="status-overlay" id="status-overlay">

        <div class="status-icon" id="status-icon">
          ✅
        </div>

        <div class="status-text" id="status-text">
          Success
        </div>

        <div class="status-subtext" id="status-subtext">
          Attendee checked in
        </div>

      </div>

      <!-- CAMERA ERROR -->

      <div class="camera-error" id="camera-error">

        <div class="icon">📷</div>

        <p>
          Camera access denied or unavailable.
          Please allow camera permissions.
        </p>

        <button onclick="startCamera()">
          Retry Camera
        </button>

      </div>

    </div>

    <!-- ACTIONS -->

    <div class="actions">

      <button class="action-btn" id="torch-btn">
        🔦 Torch
      </button>

      <button class="action-btn" id="fullscreen-btn">
        ⛶ Fullscreen
      </button>

    </div>

    <!-- HISTORY -->

    <div class="recent-scans">

      <div class="recent-title">
        Recent Scans
      </div>

      <div id="scan-history">

        <div
          style="
            text-align:center;
            padding:20px;
            color:var(--muted);
            font-size:13px;
          "
        >
          No scans yet — start scanning!
        </div>

      </div>

    </div>

  </div>

  <!-- QR LIBRARY -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>

  <script>

    const API = '/api';

    let stream = null;

    let scanning = true;

    let processing = false;

    let scanCount = 0;

    let torchOn = false;

    // BEEP

    function beep(type = 'success') {

      try {

        const ctx = new (
          window.AudioContext ||
          window.webkitAudioContext
        )();

        const oscillator = ctx.createOscillator();

        const gainNode = ctx.createGain();

        oscillator.connect(gainNode);

        gainNode.connect(ctx.destination);

        oscillator.frequency.value =
          type === 'success' ? 880 : 300;

        oscillator.type = 'sine';

        gainNode.gain.setValueAtTime(
          0.3,
          ctx.currentTime
        );

        gainNode.gain.exponentialRampToValueAtTime(
          0.001,
          ctx.currentTime + 0.3
        );

        oscillator.start(ctx.currentTime);

        oscillator.stop(ctx.currentTime + 0.3);

      } catch(e) {}

      // VIBRATION

      if (navigator.vibrate) {

        navigator.vibrate(
          type === 'success'
            ? [100]
            : [300]
        );
      }
    }

    // START CAMERA

    async function startCamera() {

      try {

        if (
          !navigator.mediaDevices ||
          !navigator.mediaDevices.getUserMedia
        ) {

          alert('Camera API not supported');

          return;
        }

        document.getElementById('camera-error')
          .style.display = 'none';

        document.getElementById('video')
          .style.display = 'block';

        stream =
          await navigator.mediaDevices.getUserMedia({

            video: {
              facingMode: 'environment',
              width: { ideal: 640 },
              height: { ideal: 640 }
            }

          });

        const video =
          document.getElementById('video');

        video.srcObject = stream;

        await video.play();

        requestAnimationFrame(scanFrame);

      } catch(err) {

        console.error(err);

        document.getElementById('video')
          .style.display = 'none';

        document.getElementById('camera-error')
          .style.display = 'flex';
      }
    }

    // SCAN FRAME

    function scanFrame() {

      if (!scanning) {

        requestAnimationFrame(scanFrame);

        return;
      }

      const video =
        document.getElementById('video');

      const canvas =
        document.getElementById('canvas');

      if (video.readyState === video.HAVE_ENOUGH_DATA) {

        canvas.width = video.videoWidth;

        canvas.height = video.videoHeight;

        const ctx =
          canvas.getContext('2d');

        ctx.drawImage(
          video,
          0,
          0,
          canvas.width,
          canvas.height
        );

        const imageData =
          ctx.getImageData(
            0,
            0,
            canvas.width,
            canvas.height
          );

        const code = jsQR(
          imageData.data,
          imageData.width,
          imageData.height,
          {
            inversionAttempts: 'attemptBoth'
          }
        );

        if (code && !processing) {

          processing = true;

          scanning = false;

          handleScan(code.data);
        }
      }

      setTimeout(() => {

        requestAnimationFrame(scanFrame);

      }, 120);
    }

    // HANDLE SCAN

    async function handleScan(qrData) {

      const loader =
        document.getElementById('loader');

      loader.style.display = 'block';

      try {

        const res = await fetch(
          `${API}/scan`,
          {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              qrData: encodeURIComponent(qrData)
            })
          }
        );

        const data = await res.json();

        loader.style.display = 'none';

        if (data.success) {

          beep('success');

          showStatus(
            'success',
            '✅',
            `Welcome, ${data.attendee.name}!`,
            `${data.attendee.event}`
          );

          addToHistory(
            'success',
            data.attendee.name,
            data.attendee.event
          );

          scanCount++;

          document.getElementById('scan-count')
            .textContent = scanCount;

        }

        else if (res.status === 400) {

          beep('error');

          showStatus(
            'warning',
            '⚠️',
            'Already Checked In',
            data.attendee
              ? `${data.attendee.name} already checked in`
              : 'QR already used'
          );

          addToHistory(
            'warning',
            data.attendee?.name || 'Unknown',
            'Already checked in'
          );
        }

        else {

          beep('error');

          showStatus(
            'error',
            '❌',
            'Invalid QR Code',
            'This QR code is not recognized'
          );

          addToHistory(
            'error',
            'Unknown',
            'Invalid QR'
          );
        }

      }

      catch(err) {

        loader.style.display = 'none';

        beep('error');

        showStatus(
          'error',
          '📡',
          'Connection Error',
          'Could not reach the server'
        );
      }

      setTimeout(() => {

        hideStatus();

        scanning = true;

        processing = false;

      }, 3000);
    }

    // SHOW STATUS

    function showStatus(
      type,
      icon,
      text,
      subtext
    ) {

      const overlay =
        document.getElementById(
          'status-overlay'
        );

      overlay.className =
        `status-overlay show ${type}`;

      document.getElementById(
        'status-icon'
      ).textContent = icon;

      document.getElementById(
        'status-text'
      ).textContent = text;

      document.getElementById(
        'status-subtext'
      ).textContent = subtext;
    }

    // HIDE STATUS

    function hideStatus() {

      document.getElementById(
        'status-overlay'
      ).className = 'status-overlay';
    }

    // HISTORY

    function addToHistory(
      type,
      name,
      detail
    ) {

      const history =
        document.getElementById(
          'scan-history'
        );

      const empty =
        history.querySelector('div[style]');

      if (empty) empty.remove();

      const now =
        new Date().toLocaleTimeString(
          'en-KE',
          {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
          }
        );

      const item =
        document.createElement('div');

      item.className = 'scan-item';

      item.innerHTML = `
        <div class="scan-dot ${type}"></div>

        <div class="scan-info">
          <div class="scan-name">${name}</div>
          <div class="scan-detail">${detail}</div>
        </div>

        <div class="scan-time">${now}</div>
      `;

      history.insertBefore(
        item,
        history.firstChild
      );

      const items =
        history.querySelectorAll('.scan-item');

      if (items.length > 5) {

        items[items.length - 1].remove();
      }
    }

    // TORCH

    async function toggleTorch() {

      try {

        const track =
          stream.getVideoTracks()[0];

        const capabilities =
          track.getCapabilities();

        if (!capabilities.torch) {

          alert('Torch not supported');

          return;
        }

        torchOn = !torchOn;

        await track.applyConstraints({
          advanced: [{ torch: torchOn }]
        });

      } catch(err) {

        console.error(err);
      }
    }

    document
      .getElementById('torch-btn')
      .addEventListener(
        'click',
        toggleTorch
      );

    // FULLSCREEN

    document
      .getElementById('fullscreen-btn')
      .addEventListener(
        'click',
        () => {

          document.documentElement
            .requestFullscreen?.();
        }
      );

    // OFFLINE

    window.addEventListener(
      'offline',
      () => {

        showStatus(
          'error',
          '📡',
          'No Internet',
          'Check your connection'
        );
      }
    );

    // CLEANUP

    window.addEventListener(
      'beforeunload',
      () => {

        if (stream) {

          stream
            .getTracks()
            .forEach(track => track.stop());
        }
      }
    );

    // START

    startCamera();

  </script>

</body>
</html>
